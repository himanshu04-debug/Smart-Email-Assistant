server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mailmind-gmail

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:mailmind}
    username: ${DB_USER:mailmind}
    password: ${DB_PASS:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: MailMindPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Redis (token cache + rate limiting) ─────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  # ── OAuth2 — Google (Gmail) ──────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.send
              - https://www.googleapis.com/auth/gmail.modify
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ── Spring AI ────────────────────────────────────────────────────────────────
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o}
          temperature: 0.7
          max-tokens: 1500
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

# ── App config ──────────────────────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:mailmind-secret-key-min-256-bits-long-please-change}
    expiration-ms: 86400000        # 24 h
    refresh-expiration-ms: 604800000  # 7 days
  gmail:
    poll-interval-ms: 60000        # how often to sync Gmail
    max-results: 50                # emails per sync batch

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.mailmind: DEBUG
    org.springframework.security: INFO
    org.springframework.ai: INFO
